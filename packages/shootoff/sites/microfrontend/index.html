      <h1>The Wally Wallington Wonder Archive</h1>
      <p>
        This interactive archive celebrates the remarkable work of Wally Wallington,
        a retired construction worker from Flint, Michigan, who demonstrated that one
        person — working alone — could move, lift, and position stones weighing over
        20 tons using nothing but wooden levers, small stone pivots, and gravity itself.
      </p>

      <h2>The Techniques</h2>

      <section>
        <h3>The Dynamic Offset Pivot</h3>
        <p>
          By placing a small stone pivot slightly off the true center of gravity,
          Wallington created controlled instability. Push the light end, the stone
          rotates 180 degrees, and the center of gravity shifts forward. Each rotation
          becomes a "step" — a locomotion algorithm where the stone walks over its
          own center of gravity. Rotational energy converts to linear displacement.
        </p>
      </section>

      <section>
        <h3>Multi-Stage Cribbing Jack</h3>
        <p>
          Vertical lifting without hydraulics. Tilt, shim, reverse, repeat. As the
          stone rises inch by inch, a crib of alternating wooden beams grows beneath it.
          The offset fulcrum ensures that if anything slips, the stone settles back onto
          the crib rather than toppling. Safety through geometry.
        </p>
      </section>

      <section>
        <h3>The Round Road</h3>
        <p>
          Not every stone is a perfect rectangle. For irregular masses, Wallington built
          temporary circular tracks and wooden cradles that normalized any shape into
          something his pivot system could handle. He essentially standardized the
          interface so his technique could operate on any input.
        </p>
      </section>

      <section>
        <h3>Sand-Box Descent</h3>
        <p>
          Gravity lifts, but it also destroys. To lower a 10-ton lintel onto uprights
          with millimeter precision, Wallington supported the stone on a box of sand
          and slowly released the grains from the bottom — like an hourglass. The sand
          acts as a variable-height support with finer control than any rope or winch.
        </p>
      </section>

      <section>
        <h3>The Rolling Pivot (Moving the Barn)</h3>
        <p>
          When Wallington moved his entire barn 300 feet, he turned the building into
          a giant lever. Pivot on one corner, swing the opposite side forward. Swap
          corners, repeat. The insight: you never need to move the entire mass at once.
          By pivoting on one corner, you overcome the friction of only a fraction of
          the weight at any given moment.
        </p>
      </section>

      <h2>The Three Laws</h2>
      <ol>
        <li><strong>Force Multiplication</strong> — The longer the lever, the less effort required.</li>
        <li><strong>Friction Reduction</strong> — The smaller the contact point, the less resistance.</li>
        <li><strong>Gravity Harvest</strong> — Use the weight of the object as the battery to power the next movement.</li>
      </ol>

      <footer>
        <p>

          the most elegant solutions often require no electricity, no fuel, and no
          budget — just a deep understanding of how the physical world works.
        </p>
