<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="820" viewBox="0 0 1280 820" role="img" aria-labelledby="title desc"><title id="title">Chapter 17 inverted-scaling and Reynolds-regime figure</title><desc id="desc">Two-panel analytic figure showing workload-speedup curves under balanced chunks and a Reynolds-number regime map with manuscript scenarios overlaid.</desc><rect width="1280" height="820" fill="#f3efe5"/><rect x="22" y="22" width="1236" height="776" rx="28" fill="#f7f4ea" stroke="#d6d3c7"/><text x="60" y="82" font-family="Georgia, serif" font-size="32" fill="#111827">Inverted Scaling and Reynolds Regimes</text><text x="60" y="114" font-family="Georgia, serif" font-size="15" fill="#4b5563">Speedup = (P × N) / (C + N - 1) | idle = (N - 1) / (C + N - 1) | Re = N / C</text><text x="60" y="136" font-family="system-ui, sans-serif" font-size="12" fill="#6b7280">Left-panel curves use the balanced-chunk cross-section C = N to expose the inverted-scaling slope directly.</text><rect x="52" y="168" width="620" height="610" rx="18" fill="#fffdfa" stroke="#d6d3c7"/><text x="76" y="202" font-family="Georgia, serif" font-size="20" fill="#111827">Inverted Scaling Under Balanced Chunks</text><text x="76" y="224" font-family="Georgia, serif" font-size="13" fill="#4b5563">Curves use C = N, so the ideal step-count slope is visible as workload grows.</text><line x1="126" y1="260" x2="126" y2="710" stroke="#e5e7eb" stroke-width="1"/><text x="126" y="732" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#6b7280">10</text><line x1="216.17145407034843" y1="260" x2="216.17145407034843" y2="710" stroke="#e5e7eb" stroke-width="1"/><text x="216.17145407034843" y="732" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#6b7280">20</text><line x1="335.3716325627874" y1="260" x2="335.3716325627874" y2="710" stroke="#e5e7eb" stroke-width="1"/><text x="335.3716325627874" y="732" text-anchor="middle" font-family="system-ui, sa