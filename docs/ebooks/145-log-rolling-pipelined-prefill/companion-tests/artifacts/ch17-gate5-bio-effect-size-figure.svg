<svg xmlns="http://www.w3.org/2000/svg" width="1240" height="780" viewBox="0 0 1240 780" role="img" aria-labelledby="title desc"><title id="title">Chapter 17 Gate 5 biological effect-size figure</title><desc id="desc">Log-scale forest plot of three biological effect-size ratios with a pooled geometric summary and gate-threshold summary card.</desc><rect width="1240" height="780" fill="#f3efe5"/><rect x="22" y="22" width="1196" height="736" rx="28" fill="#f7f4ea" stroke="#d6d3c7"/><text x="60" y="82" font-family="Georgia, serif" font-size="32" fill="#111827">Gate 5 Biological Effect-Size Mapping</text><text x="60" y="114" font-family="Georgia, serif" font-size="15" fill="#4b5563">Source gate5-bio-effect-size-v1 | pooled effect 26.57x | smallest primary CI low 5.829x</text><rect x="52" y="148" width="814" height="570" rx="18" fill="#fffdfa" stroke="#d6d3c7"/><text x="76" y="182" font-family="Georgia, serif" font-size="20" fill="#111827">Pairwise Ratios on Log Scale</text><text x="76" y="204" font-family="Georgia, serif" font-size="11" fill="#4b5563">Median ratios with 95% CIs and pooled summary.</text><line x1="322" y1="224" x2="322" y2="718" stroke="#e5e7eb" stroke-width="1"/><text x="322" y="738" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#6b7280">1x</text><line x1="388.4586024890889" y1="224" x2="388.4586024890889" y2="718" stroke="#e5e7eb" stroke-width="1"/><text x="388.4586024890889" y="738" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#6b7280">2x</text><line x1="476.31209626636667" y1="224" x2="476.31209626636667" y2="718" stroke="#e5e7eb" stroke-width="1"/><text x="476.31209626636667" y="738" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#6b7280">5x</text><line x1="542.7706987554556" y1="224" x2="542.7706987554556" y2="718" stroke="#e5e7eb" stroke-width="1"/><text x="542.7706987554556" y="738" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#6b7280">10x</text><line x1="609.2293012445444" y1="224" x2="609.2293012445444" y2="718" stroke="#e5e7eb" stroke-width="1"/><text x="609.2293012445444" y="738" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#6b7280">20x</text><line x1="697.0827950218222" y1="224" x2="697.0827950218222" y2="718" stroke="#e5e7eb" stroke-width="1"/><text x="697.0827950218222" y="738" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#6b7280">50x</text><line x1="763.5413975109111" y1="224" x2="763.5413975109111" y2="718" stroke="#e5e7eb" stroke-width="1"/><text x="763.5413975109111" y="738" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#6b7280">100x</text><line x1="830" y1="224" x2="830" y2="718" stroke="#e5e7eb" stroke-width="1"/><text x="830" y="738" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#6b7280">200x</text><line x1="388.4586024890889" y1="216" x2="388.4586024890889" y2="718" stroke="#92400e" stroke-width="2" stroke-dasharray="5 5"/><text x="388.4586024890889" y="208" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#92400e">pooled floor 2x</text><text x="76" y="300.3333333333333" font-family="Georgia, serif" font-size="15" fill="#111827">Neural conduction</text><text x="76" y="324.3333333333333" font-family="system-ui, sans-serif" font-size="11" fill="#6b7280">myelinated / unmyelinated (m/s)</text><line x1="688.6593157374973" y1="310.3333333333333" x2="826.3159858700982" y2="310.3333333333333" stroke="#1d4ed8" stroke-width="4" stroke-linecap="round"/><line x1="688.6593157374973" y1="302.3333333333333" x2="688.6593157374973" y2="318.3333333333333" stroke="#1d4ed8" stroke-width="1.5"/><line x1="826.3159858700982" y1="302.3333333333333" x2="826.3159858700982" y2="318.3333333333333" stroke="#1d4ed8" stroke-width="1.5"/><rect x="735.5377969218018" y="304.3333333333333" width="12" height="12" rx="2" fill="#0f766e" stroke="#eff6ff" stroke-width="2"/><text x="848" y="296.3333333333333" text-anchor="end" font-family="system-ui, sans-serif" font-size="12" fill="#334155">79.49x (45.79x to 192.5x)</text><text x="76" y="440.99999999999994" font-family="Georgia, serif" font-size="15" fill="#111827">Photosynthesis efficiency scale contrast</text><text x="76" y="464.99999999999994" font-family="system-ui, sans-serif" font-size="11" fill="#6b7280">step-level exciton / whole-plant yield</text><line x1="590.0583752339282" y1="450.99999999999994" x2="653.058187151759" y2="450.99999999999994" stroke="#1d4ed8" stroke-width="4" stroke-linecap="round"/><line x1="590.0583752339282" y1="442.99999999999994" x2="590.0583752339282" y2="458.99999999999994" stroke="#1d4ed8" stroke-width="1.5"/><line x1="653.058187151759" y1="442.99999999999994" x2="653.058187151759" y2="458.99999999999994" stroke="#1d4ed8" stroke-width="1.5"/><rect x="610.2689566720353" y="444.99999999999994" width="12" height="12" rx="2" fill="#0f766e" stroke="#eff6ff" stroke-width="2"/><text x="663.058187151759" y="436.99999999999994" text-anchor="start" font-family="system-ui, sans-serif" font-size="12" fill="#334155">21.52x (16.38x to 31.59x)</text><text x="76" y="581.6666666666666" font-family="Georgia, serif" font-size="15" fill="#111827">Replication chunk size</text><text x="76" y="605.6666666666666" font-family="system-ui, sans-serif" font-size="11" fill="#6b7280">prokaryotic / eukaryotic (nt)</text><line x1="491.0202435228996" y1="591.6666666666666" x2="593.9639818340315" y2="591.6666666666666" stroke="#1d4ed8" stroke-width="4" stroke-linecap="round"/><line x1="491.0202435228996" y1="583.6666666666666" x2="491.0202435228996" y2="599.6666666666666" stroke="#1d4ed8" stroke-width="1.5"/><line x1="593.9639818340315" y1="583.6666666666666" x2="593.9639818340315" y2="599.6666666666666" stroke="#1d4ed8" stroke-width="1.5"/><rect x="537.3509572932626" y="585.6666666666666" width="12" height="12" rx="2" fill="#0f766e" stroke="#eff6ff" stroke-width="2"/><text x="603.9639818340315" y="577.6666666666666" text-anchor="start" font-family="system-ui, sans-serif" font-size="12" fill="#334155">10.06x (5.829x to 17.06x)</text><text x="76" y="701" font-family="Georgia, serif" font-size="16" fill="#111827">Pooled geometric summary</text><line x1="541.4432939552669" y1="696" x2="740.0319325705084" y2="696" stroke="#b45309" stroke-width="4" stroke-linecap="round"/><polygon points="636.449890282128,686 652.449890282128,696 636.449890282128,706 620.449890282128,696" fill="#f59e0b" stroke="#78350f" stroke-width="2"/><text x="848" y="678" text-anchor="end" font-family="system-ui, sans-serif" font-size="12" fill="#334155">26.57x (9.863x to 78.25x)</text><text x="576" y="762" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#6b7280">Multiplicative effect-size ratio</text><rect x="892" y="148" width="296" height="570" rx="18" fill="#f8fafc" stroke="#cbd5e1"/><text x="916" y="182" font-family="Georgia, serif" font-size="20" fill="#111827">Gate Summary</text><text x="916" y="204" text-anchor="start" font-family="Georgia, serif" font-size="13" fill="#4b5563"><tspan x="916" dy="0">Every predeclared biological pair clears the floor,</tspan><tspan x="916" dy="17">and the pooled effect remains far above</tspan><tspan x="916" dy="17">the minimum 2x threshold.</tspan></text><circle cx="920" cy="266" r="4.5" fill="#0f766e"/><text x="934" y="270" font-family="system-ui, sans-serif" font-size="13" fill="#334155">pairs 3 total / 3 primary</text><circle cx="920" cy="306" r="4.5" fill="#0f766e"/><text x="934" y="310" font-family="system-ui, sans-serif" font-size="13" fill="#334155">criteria 4/4 passed</text><circle cx="920" cy="346" r="4.5" fill="#0f766e"/><text x="934" y="350" font-family="system-ui, sans-serif" font-size="13" fill="#334155">median pair ratio 21.52x</text><circle cx="920" cy="386" r="4.5" fill="#0f766e"/><text x="934" y="390" font-family="system-ui, sans-serif" font-size="13" fill="#334155">smallest primary CI low 5.829x</text><circle cx="920" cy="426" r="4.5" fill="#0f766e"/><text x="934" y="430" font-family="system-ui, sans-serif" font-size="13" fill="#334155">pair floor 1.2x</text><circle cx="920" cy="466" r="4.5" fill="#0f766e"/><text x="934" y="470" font-family="system-ui, sans-serif" font-size="13" fill="#334155">pooled effect 26.57x</text><circle cx="920" cy="506" r="4.5" fill="#0f766e"/><text x="934" y="510" font-family="system-ui, sans-serif" font-size="13" fill="#334155">pooled CI low 9.863x</text><circle cx="920" cy="546" r="4.5" fill="#0f766e"/><text x="934" y="550" font-family="system-ui, sans-serif" font-size="13" fill="#334155">pooled floor 2x</text><text x="916" y="612" font-family="system-ui, sans-serif" font-size="12" fill="#334155">Primary-pair pass rate</text><rect x="916" y="626" width="248" height="16" rx="8" fill="#e2e8f0"/><rect x="916" y="626" width="248" height="16" rx="8" fill="#0f766e"/><text x="1040" y="638" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#0f172a">3/3 primary pairs pass</text></svg>
