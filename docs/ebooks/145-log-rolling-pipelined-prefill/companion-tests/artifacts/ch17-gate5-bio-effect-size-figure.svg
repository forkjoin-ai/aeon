<svg xmlns="http://www.w3.org/2000/svg" width="1240" height="780" viewBox="0 0 1240 780" role="img" aria-labelledby="title desc"><title id="title">Chapter 17 Gate 5 biological effect-size figure</title><desc id="desc">Log-scale forest plot of three biological effect-size ratios with a pooled geometric summary and gate-threshold summary card.</desc><rect width="1240" height="780" fill="#f3efe5"/><rect x="22" y="22" width="1196" height="736" rx="28" fill="#f7f4ea" stroke="#d6d3c7"/><text x="60" y="82" font-family="Georgia, serif" font-size="32" fill="#111827">Gate 5 Biological Effect-Size Mapping</text><text x="60" y="114" font-family="Georgia, serif" font-size="15" fill="#4b5563">Source gate5-bio-effect-size-v1 | pooled effect 26.57x | smallest primary CI low 5.829x</text><rect x="52" y="148" width="814" height="570" rx="18" fill="#fffdfa" stroke="#d6d3c7"/><text x="76" y="182" font-family="Georgia, serif" font-size="20" fill="#111827">Pairwise Ratios on Log Scale</text><text x="76" y="204" font-family="Georgia, serif" font-size="13" fill="#4b5563">Median ratio markers with 95% uncertainty intervals, plus the pooled geometric summary.</text><line x1="302" y1="224" x2="302" y2="718" stroke="#e5e7eb" stroke-width="1"/><text x="302" y="738" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#6b7280">1x</text><line x1="371.07508290204515" y1="224" x2="371.07508290204515" y2="718" stroke="#e5e7eb" stroke-width="1"/><text x="371.07508290204515" y="738" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#6b7280">2x</text><line x1="462.3873756469323" y1="224" x2="462.3873756469323" y2="718" stroke="#e5e7eb" stroke-width="1"/><text x="462.3873756469323" y="738" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#6b7280">5x</text><line x1="531.4624585489775" y1="224" x2="531.4624585489775" y2="718" stroke="#e5e7eb" stroke-width="1"/><text x="531.4624585489775" y="738" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#6b7280">10x</text><line x1="600.5375414510227" y1="224" x2="600.5375414510227" y2="718" stroke="#e5e7eb" stroke-width="1"/><text x="600.5375414510227" y="738" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#6b7280">20x</text><line x1="691.8498341959097" y1="224" x2="691.8498341959097" y2="718" stroke="#e5e7eb" stroke-width="1"/><text x="691.8498341959097" y="738" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#6b7280">50x</text><line x1="760.9249170979549" y1="224" x2="760.9249170979549" y2="718" stroke="#e5e7eb" stroke-width="1"/><text x="760.9249170979549" y="738" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#6b7280">100x</text><line x1="830" y1="224" x2="830" y2="718" stroke="#e5e7eb" stroke-width="1"/><text x="830" y="738" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#6b7280">200x</text><line x1="371.07508290204515" y1="216" x2="371.07508290204515" y2="718" stroke="#92400e" stroke-width="2" stroke-dasharray="5 5"/><text x="371.07508290204515" y="208" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#92400e">pooled floor 2x</text><text x="76" y="300.3333333333333" font-family="Georgia, serif" font-size="15" fill="#111827">Neural conduction</text><text x="76" y="321.3333333333333" font-family="system-ui, sans-serif" font-size="12" fill="#6b7280">myelinated / unmyelinated (m/s)</text><line x1="683.0947218688948" y1="310.3333333333333" x2="826.1709459437241" y2="310.3333333333333" stroke="#1d4ed8" stroke-width="4" stroke-linecap="round"/><line x1="683.0947218688948" y1="302.3333333333333" x2="683.0947218688948" y2="318.3333333333333" stroke="#1d4ed8" stroke-width="1.5"/><line x1="826.1709459437241" y1="302.3333333333333" x2="826.1709459437241" y2="318.3333333333333" stroke="#1d4ed8" stroke-width="1.5"/><rect x="732.0550330210854" y="304.3333333333333" width="12" height="12" rx="2" fill="#0f766e" stroke="#eff6ff" stroke-width="2"/><text x="848" y="315.3333333333333" text-anchor="end" font-family="system-ui, sans-serif" font-size="12" fill="#334155">79.49x (45.79x to 192.5x)</text><text x="76" y="440.99999999999994" font-family="Georgia, serif" font-size="15" fill="#111827">Photosynthesis efficiency scale contrast</text><text x="76" y="461.99999999999994" font-family="system-ui, sans-serif" font-size="12" fill="#6b7280">step-level exciton / whole-plant yield</text><line x1="580.6118545738467" y1="450.99999999999994" x2="646.0919740474975" y2="450.99999999999994" stroke="#1d4ed8" stroke-width="4" stroke-linecap="round"/><line x1="580.6118545738467" y1="442.99999999999994" x2="580.6118545738467" y2="458.99999999999994" stroke="#1d4ed8" stroke-width="1.5"/><line x1="646.0919740474975" y1="442.99999999999994" x2="646.0919740474975" y2="458.99999999999994" stroke="#1d4ed8" stroke-width="1.5"/><rect x="601.8543486669973" y="444.99999999999994" width="12" height="12" rx="2" fill="#0f766e" stroke="#eff6ff" stroke-width="2"/><text x="848" y="455.99999999999994" text-anchor="end" font-family="system-ui, sans-serif" font-size="12" fill="#334155">21.52x (16.38x to 31.59x)</text><text x="76" y="581.6666666666666" font-family="Georgia, serif" font-size="15" fill="#111827">Replication chunk size</text><text x="76" y="602.6666666666666" font-family="system-ui, sans-serif" font-size="12" fill="#6b7280">prokaryotic / eukaryotic (nt)</text><line x1="477.6745838190767" y1="591.6666666666666" x2="584.6712252133241" y2="591.6666666666666" stroke="#1d4ed8" stroke-width="4" stroke-linecap="round"/><line x1="477.6745838190767" y1="583.6666666666666" x2="477.6745838190767" y2="599.6666666666666" stroke="#1d4ed8" stroke-width="1.5"/><line x1="584.6712252133241" y1="583.6666666666666" x2="584.6712252133241" y2="599.6666666666666" stroke="#1d4ed8" stroke-width="1.5"/><rect x="526.0655619111076" y="585.6666666666666" width="12" height="12" rx="2" fill="#0f766e" stroke="#eff6ff" stroke-width="2"/><text x="848" y="596.6666666666666" text-anchor="end" font-family="system-ui, sans-serif" font-size="12" fill="#334155">10.06x (5.829x to 17.06x)</text><text x="76" y="701" font-family="Georgia, serif" font-size="16" fill="#111827">Pooled geometric summary</text><line x1="530.0827937172853" y1="696" x2="736.4898826717094" y2="696" stroke="#b45309" stroke-width="4" stroke-linecap="round"/><polygon points="628.8298072223693,686 644.8298072223693,696 628.8298072223693,706 612.8298072223693,696" fill="#f59e0b" stroke="#78350f" stroke-width="2"/><text x="848" y="701" text-anchor="end" font-family="system-ui, sans-serif" font-size="12" fill="#334155">26.57x (9.863x to 78.25x)</text><text x="566" y="762" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#6b7280">Multiplicative effect-size ratio</text><rect x="892" y="148" width="296" height="570" rx="18" fill="#f8fafc" stroke="#cbd5e1"/><text x="916" y="182" font-family="Georgia, serif" font-size="20" fill="#111827">Gate Summary</text><text x="916" y="204" text-anchor="start" font-family="Georgia, serif" font-size="13" fill="#4b5563"><tspan x="916" dy="0">Every predeclared biological pair clears the floor,</tspan><tspan x="916" dy="17">and the pooled effect remains far above</tspan><tspan x="916" dy="17">the minimum 2x threshold.</tspan></text><circle cx="920" cy="266" r="4.5" fill="#0f766e"/><text x="934" y="270" font-family="system-ui, sans-serif" font-size="13" fill="#334155">pairs 3 total / 3 primary</text><circle cx="920" cy="306" r="4.5" fill="#0f766e"/><text x="934" y="310" font-family="system-ui, sans-serif" font-size="13" fill="#334155">criteria 4/4 passed</text><circle cx="920" cy="346" r="4.5" fill="#0f766e"/><text x="934" y="350" font-family="system-ui, sans-serif" font-size="13" fill="#334155">median pair ratio 21.52x</text><circle cx="920" cy="386" r="4.5" fill="#0f766e"/><text x="934" y="390" font-family="system-ui, sans-serif" font-size="13" fill="#334155">smallest primary CI low 5.829x</text><circle cx="920" cy="426" r="4.5" fill="#0f766e"/><text x="934" y="430" font-family="system-ui, sans-serif" font-size="13" fill="#334155">pair floor 1.2x</text><circle cx="920" cy="466" r="4.5" fill="#0f766e"/><text x="934" y="470" font-family="system-ui, sans-serif" font-size="13" fill="#334155">pooled effect 26.57x</text><circle cx="920" cy="506" r="4.5" fill="#0f766e"/><text x="934" y="510" font-family="system-ui, sans-serif" font-size="13" fill="#334155">pooled CI low 9.863x</text><circle cx="920" cy="546" r="4.5" fill="#0f766e"/><text x="934" y="550" font-family="system-ui, sans-serif" font-size="13" fill="#334155">pooled floor 2x</text><text x="916" y="612" font-family="system-ui, sans-serif" font-size="12" fill="#334155">Primary-pair pass rate</text><rect x="916" y="626" width="248" height="16" rx="8" fill="#e2e8f0"/><rect x="916" y="626" width="248" height="16" rx="8" fill="#0f766e"/><text x="1040" y="638" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#0f172a">3/3 primary pairs pass</text></svg>
